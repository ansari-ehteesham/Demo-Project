version: 0.2

env:
  parameter-store:
    KEYSTORE_BASE64: "/myapp/keystore-base64"
    KEYSTORE_PASSWORD: "/myapp/keystore-password"
    KEY_ALIAS: "/myapp/key-alias"
    KEY_PASSWORD: "/myapp/key-password"
    FIREBASE_APP_ID: "/myapp/firebase-app-id"
    FIREBASE_SERVICE_ACCOUNT: "/myapp/firebase-service-account"

phases:
  install:
    runtime-versions:
      nodejs: 20
      java: corretto17
    commands:
      - export ANDROID_SDK_ROOT=/usr/local/android-sdk
      - mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
      - curl -s -o cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
      - unzip -q cmdline-tools.zip -d $ANDROID_SDK_ROOT/cmdline-tools
      - mv $ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest
      - export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools
      - yes | sdkmanager --licenses > /dev/null
      - sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
      - npm ci
      - npm install -g firebase-tools

  pre_build:
    commands:
      - echo "$KEYSTORE_BASE64" | tr -d '\n\r ' | base64 -d --ignore-garbage > android/app/release.keystore

  build:
    commands:
      - cd android
      - chmod +x ./gradlew
      - ./gradlew assembleRelease
        -PMYAPP_UPLOAD_STORE_FILE=release.keystore
        -PMYAPP_UPLOAD_STORE_PASSWORD=$KEYSTORE_PASSWORD
        -PMYAPP_UPLOAD_KEY_ALIAS=$KEY_ALIAS
        -PMYAPP_UPLOAD_KEY_PASSWORD=$KEY_PASSWORD
      - cd ..

  post_build:
    commands:
      - echo "$FIREBASE_SERVICE_ACCOUNT" > /tmp/firebase-key.json && export GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-key.json && firebase appdistribution:distribute android/app/build/outputs/apk/release/app-release-unsigned.apk --app "$FIREBASE_APP_ID" --groups "testers" --release-notes "Automated build from commit $CODEBUILD_RESOLVED_SOURCE_VERSION"

artifacts:
  files:
    - android/app/build/outputs/apk/release/*.apk
  discard-paths: yes